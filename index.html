<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản</title>
    <link rel="stylesheet" href="css/style.css"> 
</head>
<body>

<div class="container">
    <form id="frmLogin" action="#" method="POST">
        <h2 id="title">ĐĂNG KÝ</h2>
        <div class="form-control">
            <label for="txtRegisterUser">Tên đăng nhập:</label>
            <input type="text" id="txtRegisterUser" placeholder="Tạo tài khoản..." required>
        </div>
        
		<div class="form-control">
            <label for="txtRegisterPassConfirm">Tuổi:</label>
            <input type="text" id="txtNumber" placeholder="Nhập tuổi..." required>
        </div>
		
		<div class="form-control">
            <label for="txtRegisterPassConfirm">Nơi sinh:</label>
            <input type="text" id="txt" placeholder="Nhập nơi sinh..." required>
        </div>
		
		<div class="form-control">
            <label for="txtRegisterPassConfirm">HỌ TÊN THẬT:</label>
            <input type="text" id="txtRegisterPassConfirm" placeholder="Nhập lại mật khẩu..." required>
        </div>
		
        <div class="form-control">
            <label for="txtRegisterEmail">Email:</label>
            <input type="email" id="txtRegisterEmail" placeholder="Nhập email của bạn..." required>
        </div>
        
        <div class="form-control">
            <label for="txtRegisterPass">Mật khẩu:</label>
            <input type="password" id="txtRegisterPass" placeholder="Tạo mật khẩu..." required>
        </div>
        
        <div class="form-control">
            <label for="txtRegisterPassConfirm">Xác nhận mật khẩu:</label>
            <input type="password" id="txtRegisterPassConfirm" placeholder="Nhập lại mật khẩu..." required>
        </div>
        
        <input type="submit" class="button" value="Đăng ký">
        
       
        <p class="switch-form">
            Bạn đã có tài khoản? <a href="page2.html">Đăng nhập ngay</a> <br>
                  <a href="html/page3.html">HIỂN THỊ CÂU CHÀO</a> <br>
                  <a href="html/page4.html">NHẬP DỮ LIỆU VÀ HIỂN THỊ CÂU CHÀO</a><br>
                  <a href="html/page5.html">DT HCN</a><br>
                  <a href="html/page6.html">BẢNG BÁN HÀNG</a><br>
                  <a href="html/page7.html">BẢNG CỬU CHƯƠNG</a><br>
                  <a href="html/page8.html">WEB BÁN HÀNG</a><br>
                  <a href="html/page9.html">WEB BÁN HÀNG V2</a><br>
        </p>
    </form>
</div>
</body>
</html>

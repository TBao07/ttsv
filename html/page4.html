<!DOCTYPE html>
<html lang ="vi">
<head>
	<meta charset="UTF-8">
	<title>NHẬP DỮ LIỆU VÀ HIỂN THỊ prompt và alert</title>
	<!--<link href="../css/style.css" rel="stylesheet">-->
</head>
<body>
	<div class="container">
		<p id = "name">
			Bảo 
			</p>
	</div>
	<script>
		let name = prompt("nhập vào tên của bạn:");
		let yob = Number (prompt("nhập năm sinh của bạn: "));
		alert("Xin chào " + name + " năm nay bạn " + (2026 - yob) + (" tuổi, già dữ lẳm rồi đó :))))))"));
	</script>
</body>
</head>
</html>

<!DOCTYPE html>
<html lang ="vi">
<head>
	<meta charset="UTF-8">
	<title>THIẾT KẾ FORM LOGIN</title>
	<link href="../css/style.css" rel="stylesheet">
</head>
<body>
	<div class="container">
		<form id="frmLogin">
			<h2 id="title">ĐĂNG NHẬP HỆ THỐNG</h2>
		<div class="form-group">
			<label for="txtUsername">Tên đăng nhập: </label>
			<input type="text" id="txtUsername" placeholder="Tên đăng nhập..." required>
		</div>
		<div class="form-group">
			<label for="txtPassword">Mật khẩu: </label>
			<input type="password" id="txtPassword" placeholder="Mật khẩu..." required>
		</div>
		<input class="button" type="reset" name="rsCancel" id="rsCancel" value="Cancel">
		<input class="button" type="submit" name="sbLogin" id="sbLogin" value="Login">
		
		<p class="switch-form">
            Bạn chưa có tài khoản? <a href="../index.html">Đăng ký ngay</a>
        </p>
		
		</form>
	</div>
</body>
</head>
</html>
